<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="PurpleClaw SOC dashboard for posture tracking, findings, remediation, and safe validation workflows."
    />
    <link rel="icon" href="/favicon/PURPLECLAW.ico" type="image/x-icon" />
    <link rel="icon" type="image/svg+xml" href="/logo/PURPLECLAW-LIGHT.svg" />
    <title>PurpleClaw Security Platform</title>
    <script>
      (() => {
        const key = 'purpleclaw-theme';
        const stored = localStorage.getItem(key);
        const theme = stored === 'light' || stored === 'dark' ? stored : 'dark';
        document.documentElement.dataset.theme = theme;
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
