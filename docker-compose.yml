services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: purpleclaw-backend
    environment:
      # Database — leave empty for embedded SQLite, or set PostgreSQL URL
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/purpleclaw.db}

      # Auth
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-this-to-a-long-random-secret-in-prod}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-480}

      # Bootstrap admin account (login: admin / admin — change in production)
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin}

      # CORS — comma-separated list of allowed frontend origins
      # Use * only in dev; set to your actual domain(s) in production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}

      # Seed control — set to false to skip demo data (only admin user created)
      SEED_DEMO_DATA: ${SEED_DEMO_DATA:-true}

      # ── Prometheus integration ──────────────────────────────────────────────
      # Set PROMETHEUS_URL to your Prometheus instance.
      # In a homelab: http://host.docker.internal:9090 (if on the same host)
      # Or use the service name if Prometheus runs in the same Docker network.
      # Add additional environments as PROMETHEUS_URL_<envname>=http://...
      PROMETHEUS_URL: ${PROMETHEUS_URL:-}
      PROMETHEUS_ENV_ID: ${PROMETHEUS_ENV_ID:-default}
      PROMETHEUS_TIMEOUT: ${PROMETHEUS_TIMEOUT:-3.0}

      # ── Loki integration ────────────────────────────────────────────────────
      # Set LOKI_URL to your Loki instance.
      # In a homelab: http://host.docker.internal:3100
      LOKI_URL: ${LOKI_URL:-}
      LOKI_ENV_ID: ${LOKI_ENV_ID:-default}
      LOKI_TIMEOUT: ${LOKI_TIMEOUT:-3.0}
      # Expected log sources for gap detection (comma-separated)
      LOKI_EXPECTED_SOURCES: ${LOKI_EXPECTED_SOURCES:-}

      # ── Autonomous engine ──────────────────────────────────────────────────
      DISCOVERY_INTERVAL: ${DISCOVERY_INTERVAL:-900}
      THREAT_INTERVAL: ${THREAT_INTERVAL:-300}
      AUTO_RESPONSE: ${AUTO_RESPONSE:-false}
      AUTO_RESPONSE_LEVEL: ${AUTO_RESPONSE_LEVEL:-safe}

      # ── Network scanner (zero-config discovery) ────────────────────────────
      # Scans the container's /24 subnet + host.docker.internal by default.
      # Set to false to rely only on explicitly configured service URLs.
      SCAN_NETWORK: ${SCAN_NETWORK:-true}
      # Additional CIDR ranges to scan (comma-separated, e.g. 192.168.10.0/24)
      SCAN_RANGES: ${SCAN_RANGES:-}
      # CIDR ranges to exclude from scanning (comma-separated)
      SCAN_EXCLUDE: ${SCAN_EXCLUDE:-}
      # TCP connect timeout per port (seconds)
      SCAN_TIMEOUT: ${SCAN_TIMEOUT:-0.5}
      # HTTP fingerprint probe timeout (seconds)
      SCAN_FP_TIMEOUT: ${SCAN_FP_TIMEOUT:-3.0}
      # Parallel TCP scan workers
      SCAN_CONCURRENCY: ${SCAN_CONCURRENCY:-100}

      # ── Kubernetes integration ──────────────────────────────────────────────
      KUBERNETES_URL: ${KUBERNETES_URL:-}
      KUBERNETES_TOKEN: ${KUBERNETES_TOKEN:-}
      KUBERNETES_VERIFY_SSL: ${KUBERNETES_VERIFY_SSL:-true}

      # ── Grafana integration ─────────────────────────────────────────────────
      GRAFANA_URL: ${GRAFANA_URL:-}
      GRAFANA_API_KEY: ${GRAFANA_API_KEY:-}

      # ── Ollama integration ──────────────────────────────────────────────────
      OLLAMA_URL: ${OLLAMA_URL:-}

      # ── MLflow integration ──────────────────────────────────────────────────
      MLFLOW_URL: ${MLFLOW_URL:-}
      MLFLOW_TOKEN: ${MLFLOW_TOKEN:-}

    ports:
      - "${BACKEND_PORT:-8001}:8001"
    volumes:
      - purpleclaw_data:/app/data
    restart: unless-stopped
    networks:
      - purpleclaw-net
    # Allows the backend container to reach services on the Docker host
    # (e.g. Prometheus/Loki running directly on the homelab host)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: purpleclaw-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    restart: unless-stopped
    networks:
      - purpleclaw-net

volumes:
  purpleclaw_data:

networks:
  purpleclaw-net:
    driver: bridge
