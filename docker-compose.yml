services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: purpleclaw-backend
    environment:
      DATABASE_URL: sqlite:////app/data/purpleclaw.db
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:-change-this-to-a-long-random-secret-in-prod}
      AUTH_TOKEN_EXPIRE_MINUTES: ${AUTH_TOKEN_EXPIRE_MINUTES:-480}
    ports:
      - "8001:8001"
    volumes:
      - purpleclaw_data:/app/data
    restart: unless-stopped
    networks:
      - purpleclaw-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: purpleclaw-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"
    restart: unless-stopped
    networks:
      - purpleclaw-net

volumes:
  purpleclaw_data:

networks:
  purpleclaw-net:
    driver: bridge
